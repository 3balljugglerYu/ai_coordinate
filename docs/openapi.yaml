components:
  securitySchemes:
    SupabaseSessionCookie:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: |
        Draft placeholder for Supabase SSR/browser session cookies.
        Actual cookie names may vary by project and runtime configuration.
    BearerSecret:
      type: http
      scheme: bearer
      description: Bearer secret used by internal scheduled jobs.
    StripeSignature:
      type: apiKey
      in: header
      name: stripe-signature
      description: Stripe webhook signature header.
  parameters:
    id:
      name: id
      in: path
      required: true
      description: Generic resource identifier.
      schema:
        type: string
    userId:
      name: userId
      in: path
      required: true
      description: Supabase user identifier.
      schema:
        type: string
        format: uuid
    blockedUserId:
      name: blockedUserId
      in: path
      required: true
      description: User identifier for the blocked user.
      schema:
        type: string
        format: uuid
    postId:
      name: postId
      in: path
      required: true
      description: Post identifier.
      schema:
        type: string
    slug:
      name: slug
      in: path
      required: true
      description: Slug used to identify a materials image collection.
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      description: Page size.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    offset:
      name: offset
      in: query
      required: false
      description: Zero-based pagination offset.
      schema:
        type: integer
        minimum: 0
        default: 0
    sort:
      name: sort
      in: query
      required: false
      description: Feed sort mode.
      schema:
        type: string
        enum: [newest, following, daily, week, month, popular]
        default: newest
    q:
      name: q
      in: query
      required: false
      description: Free-text search query.
      schema:
        type: string
    jobId:
      name: id
      in: query
      required: true
      description: Async generation job identifier.
      schema:
        type: string
  responses:
    BadRequest:
      description: Request validation or parameter error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required or the provided credentials are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The authenticated caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: true
      examples:
        generic:
          value:
            error: Invalid request
    PostSummary:
      type: object
      description: Minimal placeholder schema for feed items. Refine against runtime payloads.
      properties:
        id:
          type: string
        user_id:
          type: string
        caption:
          type: string
        image_url:
          type:
            - string
            - "null"
      additionalProperties: true
    PostsListResponse:
      type: object
      required: [posts, hasMore]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostSummary"
        hasMore:
          type: boolean
    GenerateAsyncRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 1000
        sourceImageBase64:
          type: string
          description: Base64-encoded source image. Required when `sourceImageStockId` is not supplied.
        sourceImageMimeType:
          type: string
          enum:
            - image/png
            - image/jpeg
            - image/jpg
            - image/webp
            - image/gif
            - image/heic
            - image/heif
        sourceImageStockId:
          type: string
          format: uuid
        sourceImageType:
          type: string
          default: illustration
        backgroundMode:
          type: string
          description: Background mode enum from the generation feature.
        count:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
        generationType:
          type: string
          enum: [coordinate, specified_coordinate, full_body, chibi]
          default: coordinate
        model:
          type: string
          enum:
            - gemini-2.5-flash-image
            - gemini-3-pro-image-1k
            - gemini-3-pro-image-2k
            - gemini-3-pro-image-4k
            - gemini-2.5-flash-image-preview
            - gemini-3-pro-image-preview
            - gemini-3-pro-image
          default: gemini-2.5-flash-image
      additionalProperties: false
    GenerateAsyncQueuedResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          type: string
          example: queued
    GenerateAsyncAcceptedResponse:
      allOf:
        - $ref: "#/components/schemas/GenerateAsyncQueuedResponse"
        - type: object
          properties:
            warning:
              type: string
    GenerationStatusResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
        resultImageUrl:
          type:
            - string
            - "null"
          format: uri
        errorMessage:
          type:
            - string
            - "null"
    CheckoutRequest:
      type: object
      required: [packageId]
      properties:
        packageId:
          type: string
    CheckoutPackage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        credits:
          type: integer
        priceYen:
          type: integer
        description:
          type:
            - string
            - "null"
      additionalProperties: true
    CheckoutStripeResponse:
      type: object
      required: [mode, checkoutUrl, package]
      properties:
        mode:
          type: string
          const: stripe
        checkoutUrl:
          type: string
          format: uri
        package:
          $ref: "#/components/schemas/CheckoutPackage"
    CheckoutMockResponse:
      type: object
      required: [mode, checkoutUrl, package]
      properties:
        mode:
          type: string
          const: mock
        checkoutUrl:
          type: string
        package:
          $ref: "#/components/schemas/CheckoutPackage"
    GrantItem:
      type: object
      required: [email, amount]
      properties:
        email:
          type: string
          format: email
        amount:
          type: integer
          minimum: 1
    GrantBatchRequest:
      type: object
      required: [grants, balance_type, reason]
      properties:
        grants:
          type: array
          minItems: 1
          maxItems: 300
          items:
            $ref: "#/components/schemas/GrantItem"
        balance_type:
          type: string
          description: Admin credit balance type enum. Refine from `ADMIN_PERCOIN_BALANCE_TYPES`.
        reason:
          type: string
          minLength: 1
          maxLength: 500
        send_notification:
          type: boolean
          default: true
    GrantBatchSuccessResult:
      type: object
      required: [email, status, user_id, balance_before, amount_granted, balance_after]
      properties:
        email:
          type: string
          format: email
        status:
          type: string
          const: success
        user_id:
          type: string
        balance_before:
          type: integer
        amount_granted:
          type: integer
        balance_after:
          type: integer
    GrantBatchSkippedResult:
      type: object
      required: [email, status, error]
      properties:
        email:
          type: string
          format: email
        status:
          type: string
          const: skipped
        error:
          type: string
    GrantBatchErrorResult:
      type: object
      required: [email, status, error]
      properties:
        email:
          type: string
          format: email
        status:
          type: string
          const: error
        error:
          type: string
    GrantBatchResult:
      oneOf:
        - $ref: "#/components/schemas/GrantBatchSuccessResult"
        - $ref: "#/components/schemas/GrantBatchSkippedResult"
        - $ref: "#/components/schemas/GrantBatchErrorResult"
    GrantBatchSummary:
      type: object
      required: [total, success, skipped, error]
      properties:
        total:
          type: integer
        success:
          type: integer
        skipped:
          type: integer
        error:
          type: integer
    GrantBatchResponse:
      type: object
      required: [success, results, summary, message]
      properties:
        success:
          type: boolean
        results:
          type: array
          items:
            $ref: "#/components/schemas/GrantBatchResult"
        summary:
          $ref: "#/components/schemas/GrantBatchSummary"
        message:
          type: string
    AccountPurgeRequest:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
    AccountPurgeFailure:
      type: object
      required: [user_id, reason]
      properties:
        user_id:
          type: string
        reason:
          type: string
    AccountPurgeResponse:
      type: object
      required:
        - success
        - processed_count
        - deleted_count
        - failed_count
        - avatar_path_parse_failed_count
        - failures
      properties:
        success:
          type: boolean
        processed_count:
          type: integer
        deleted_count:
          type: integer
        failed_count:
          type: integer
        avatar_path_parse_failed_count:
          type: integer
        failures:
          type: array
          items:
            $ref: "#/components/schemas/AccountPurgeFailure"
    UserProfile:
      type: object
      required: [id, user_id]
      properties:
        id:
          type: string
        user_id:
          type: string
        nickname:
          type:
            - string
            - "null"
        bio:
          type:
            - string
            - "null"
        avatar_url:
          type:
            - string
            - "null"
          format: uri
        created_at:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type:
            - string
            - "null"
          format: date-time
    UserProfilePatchRequest:
      type: object
      properties:
        nickname:
          type:
            - string
            - "null"
          maxLength: 20
        bio:
          type:
            - string
            - "null"
          maxLength: 200
      additionalProperties: false
    Comment:
      type: object
      description: Placeholder schema for comment payloads returned by the posts module.
      properties:
        id:
          type: string
        content:
          type: string
        user_id:
          type: string
        created_at:
          type:
            - string
            - "null"
          format: date-time
      additionalProperties: true
    CommentsListResponse:
      type: object
      required: [comments]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
    CommentCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
    StreakResponse:
      type: object
      required: [bonus_granted, checked_in_today]
      properties:
        bonus_granted:
          type: integer
        streak_days:
          type:
            - integer
            - "null"
        checked_in_today:
          type: boolean
        last_streak_login_at:
          type:
            - string
            - "null"
          format: date-time
        error:
          type:
            - string
            - "null"
    StripeWebhookResponse:
      type: object
      properties:
        received:
          type: boolean
        handled:
          type: boolean
        idempotent:
          type: boolean
        message:
          type:
            - string
            - "null"
        eventType:
          type:
            - string
            - "null"
        userId:
          type:
            - string
            - "null"
        percoins:
          type:
            - integer
            - "null"
        paymentIntentId:
          type:
            - string
            - "null"
      additionalProperties: true
