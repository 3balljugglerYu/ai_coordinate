openapi: 3.1.0
info:
  title: Persta.AI Application API
  version: "0.1.0-draft"
  summary: Draft OpenAPI spec derived from docs/API.md and current Next.js Route Handlers.
  description: |
    This is a draft OpenAPI specification for the internal application APIs used by Persta.AI.
    It was generated from `docs/API.md` and the current implementation under `app/api/**/route.ts`
    on 2026-03-13.

    Important notes:
    - This API surface is primarily used by the first-party web app, not as a stable public API.
    - Session-authenticated operations usually depend on Supabase browser cookies.
    - Several endpoints are intentionally documented as operational or webhook entry points.
    - Some response bodies remain approximate and should be refined against runtime payloads.
servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: "{siteUrl}/api"
    description: Deployment URL placeholder
    variables:
      siteUrl:
        default: https://your-site.example.com
tags:
  - name: posts
    description: Post browsing, interaction, and comment APIs
  - name: users
    description: Profile, follow, block, and avatar APIs
  - name: credits
    description: Credit balance and checkout flows
  - name: generate-async
    description: Async image generation job creation
  - name: generation-status
    description: Job status polling APIs
  - name: account
    description: Current account state and self-service operations
  - name: notifications
    description: Notification list and read-state operations
  - name: admin
    description: Admin-only and operational APIs
  - name: referral
    description: Referral and first-login bonus flows
  - name: reports
    description: Reporting and moderation metrics
  - name: revalidate
    description: Cache invalidation endpoints
  - name: source-image-stocks
    description: Source image stock management
  - name: streak
    description: Daily streak status and check-in
  - name: stripe
    description: Stripe webhook endpoints
  - name: webhook
    description: External webhook entry points
  - name: banners
    description: Public banner APIs
  - name: comments
    description: Direct comment editing APIs
  - name: contact
    description: Contact form submission
  - name: hello
    description: Simple health-check style endpoint
  - name: my-page
    description: My-page specific APIs
  - name: internal
    description: Internal operational APIs
  - name: tutorial
    description: Tutorial completion flow
  - name: generate-webp
    description: WebP conversion endpoint
paths:
  /posts:
    get:
      tags: [posts]
      summary: List posts.
      description: |
        Returns a paginated list of posts for the feed.
        The current implementation supports optional keyword search and multiple sort modes.
      operationId: getPosts
      x-access-level: public
      security: []
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/q"
      responses:
        "200":
          description: Posts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /generate-async:
    post:
      tags: [generate-async]
      summary: Create an async image generation job.
      description: |
        Validates the request, checks the caller's balance, creates a record in `image_jobs`,
        and attempts to enqueue work for the background image worker.
      operationId: postGenerateAsync
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAsyncRequest"
      responses:
        "200":
          description: Job created and queue dispatch accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAsyncQueuedResponse"
        "202":
          description: Job created, but queue delivery may be delayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAsyncAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /generation-status:
    get:
      tags: [generation-status]
      summary: Get generation job status.
      description: Returns the state of a single async generation job owned by the current user.
      operationId: getGenerationStatus
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/jobId"
      responses:
        "200":
          description: Job status retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /credits/checkout:
    post:
      tags: [credits]
      summary: Create a Stripe Checkout session for a credit package.
      description: |
        Returns either a live Stripe Checkout URL or a mock checkout URL when Stripe is not configured.
      operationId: postCreditsCheckout
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout URL created.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CheckoutStripeResponse"
                  - $ref: "#/components/schemas/CheckoutMockResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: Stripe rate limit error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          description: Stripe connectivity or upstream availability issue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/bonus/grant-batch:
    post:
      tags: [admin]
      summary: Grant credits to multiple users in a single admin request.
      operationId: postAdminBonusGrantBatch
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantBatchRequest"
      responses:
        "200":
          description: Batch processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /internal/account-purge:
    get:
      tags: [internal]
      summary: Purge deletion-eligible accounts.
      description: |
        Protected operational endpoint used by scheduled jobs to delete due accounts and related assets.
      operationId: getInternalAccountPurge
      x-access-level: bearer secret
      security:
        - BearerSecret: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of deletion candidates to process.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Purge run completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPurgeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [internal]
      summary: Purge deletion-eligible accounts.
      operationId: postInternalAccountPurge
      x-access-level: bearer secret
      security:
        - BearerSecret: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPurgeRequest"
      responses:
        "200":
          description: Purge run completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPurgeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /internal/generated-images/ensure-webp:
    post:
      tags: [internal]
      summary: 指定画像の WebP variants 生成を非同期でキックする
      operationId: postInternalGeneratedImagesEnsureWebp
      x-access-level: bearer secret
      security:
        - BearerSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - imageId
              properties:
                imageId:
                  type: string
      responses:
        "202":
          description: Accepted for asynchronous processing.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{userId}/profile:
    get:
      tags: [users]
      summary: Get a user profile.
      operationId: getUserProfile
      x-access-level: public
      security: []
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: Profile retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [users]
      summary: Update the current user's profile.
      operationId: patchUserProfile
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfilePatchRequest"
      responses:
        "200":
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /posts/{id}/comments:
    get:
      tags: [posts]
      summary: List comments for a post.
      operationId: getPostComments
      x-access-level: public
      security: []
      parameters:
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Comments retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [posts]
      summary: Create a comment on a post.
      operationId: postPostComment
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "200":
          description: Comment created.
          content:
            application/json:
              schema:
                type: object
                required: [comment]
                properties:
                  comment:
                    $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /streak/check:
    get:
      tags: [streak]
      summary: Get current streak status.
      operationId: getStreakStatus
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Streak status retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [streak]
      summary: Execute a streak check-in.
      operationId: postStreakCheckin
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Streak check-in completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /stripe/webhook:
    post:
      tags: [stripe]
      summary: Handle Stripe webhooks.
      description: |
        Validates the `stripe-signature` header and currently processes `checkout.session.completed`
        to credit the corresponding user account.
      operationId: postStripeWebhook
      x-access-level: webhook
      security:
        - StripeSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook accepted or event ignored successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/blocks/{blockedUserId}:
    delete:
      tags: [account]
      summary: Unblock a blocked user.
      operationId: delete_account_blocks_blockedUserId
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/blockedUserId"
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/blocks:
    get:
      tags: [account]
      summary: List users blocked by the current user.
      operationId: get_account_blocks
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/deactivate:
    post:
      tags: [account]
      summary: Deactivate the current user account.
      operationId: post_account_deactivate
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/reactivate:
    post:
      tags: [account]
      summary: Reactivate the current user account.
      operationId: post_account_reactivate
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/reports/{postId}:
    delete:
      tags: [account]
      summary: Cancel a report created by the current user.
      operationId: delete_account_reports_postId
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/postId"
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /account/reports:
    get:
      tags: [account]
      summary: List posts reported by the current user.
      operationId: get_account_reports
      x-access-level: user session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/audit-log:
    get:
      tags: [admin]
      summary: List admin audit logs.
      operationId: get_admin_audit_log
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/banners/{id}:
    patch:
      tags: [admin]
      summary: バナー管理API（更新・削除）
      operationId: patch_admin_banners_id
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [admin]
      summary: バナー管理API（更新・削除）
      operationId: delete_admin_banners_id
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/banners/reorder:
    post:
      tags: [admin]
      summary: バナー表示順の一括更新API
      operationId: post_admin_banners_reorder
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/banners:
    get:
      tags: [admin]
      summary: バナー管理API（一覧・作成）
      operationId: get_admin_banners
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [admin]
      summary: バナー管理API（一覧・作成）
      operationId: post_admin_banners
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/bonus/bulk-lookup:
    post:
      tags: [admin]
      summary: メールアドレス配列から user_id と残高を一括取得
      operationId: post_admin_bonus_bulk_lookup
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/bonus/grant:
    post:
      tags: [admin]
      summary: 運営者からのボーナス付与API
      operationId: post_admin_bonus_grant
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/credits-summary:
    get:
      tags: [admin]
      summary: Get credit summary metrics for admin UI.
      operationId: get_admin_credits_summary
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/deduction:
    post:
      tags: [admin]
      summary: ペルコイン減算API
      operationId: post_admin_deduction
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/generate-webp:
    post:
      tags: [admin]
      summary: 既存資産のWebP生成バッチ処理API
      operationId: post_admin_generate_webp
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - name: scope
          in: query
          description: `posted` は公開済みのみ、`all` は全件を対象にする。
          schema:
            type: string
            enum: [posted, all]
            default: posted
        - name: limit
          in: query
          description: 1回あたりの処理件数。
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: 処理開始位置。
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [admin]
      summary: 既存資産のWebP生成バッチ処理API
      operationId: get_admin_generate_webp
      x-access-level: admin session
      security:
        - SupabaseSessionCookie: []
      parameters:
        - name: scope
          in: query
          description: `posted` は公開済みのみ、`all` は全件を対象にする。
          schema:
            type: string
            enum: [posted, all]
            default: posted
      responses:
        "200":
          description: Successful response.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/generate-webp-by-id:
    post:
      tags: [admin]
