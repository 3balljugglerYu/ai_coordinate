      formatter は replyTitle の翻訳キーを使い、
      利用可能であれば comment_content を本文として返す。
    preconditions:
      - notification.type is comment
      - notification.entity_type is comment
    preconditions_ja:
      - notification.type が comment である
      - notification.entity_type が comment である
    postconditions:
      success:
        - Returned title uses replyTitle with actor interpolation
        - Returned body prefers notification.data.comment_content
      error:
        - None
    postconditions_ja:
      success:
        - 返却 title が actor 補間付きの replyTitle を使う
        - 返却 body が notification.data.comment_content を優先する
      error:
        - なし
    edge_cases:
      - description: When comment_content is missing or blank
        expected: The formatter falls back to notification.body
    edge_cases_ja:
      - description: comment_content が存在しない、または空白のみの場合
        expected: formatter は notification.body にフォールバックする
    test_cases:
      - formatNotificationContent_GivenReplyNotification_ShouldUseReplyTitle
      - formatNotificationContent_GivenReplyNotificationWithoutCommentContent_ShouldFallbackToBody
    test_cases_ja:
      - formatNotificationContent_comment実体のcomment通知の場合_replyTitleを使う
      - formatNotificationContent_comment実体でcomment_contentが無い場合_bodyへフォールバックする
