name: Coverage PR Comment

on:
  workflow_run:
    workflows:
      - Coverage
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  sticky-comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.pull_requests[0].number
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download coverage artifact from triggering run
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: jest-coverage
          path: coverage-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Build PR comment body
        run: |
          if [ -f coverage-artifact/coverage-comment.md ]; then
            cp coverage-artifact/coverage-comment.md pr-comment.md
            exit 0
          fi

          cat > pr-comment.md <<EOF
          <!-- jest-coverage-comment -->
          ## Jest Coverage

          Coverage summary could not be generated for this run.

          - Workflow conclusion: ${{ github.event.workflow_run.conclusion }}
          - Run: ${{ github.event.workflow_run.html_url }}
          EOF

      - name: Update sticky PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const marker = '<!-- jest-coverage-comment -->';
            const issue_number = context.payload.workflow_run.pull_requests[0].number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
