name: Coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  jest-coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest coverage
        run: npm run test:coverage -- --coverageReporters=text-summary --coverageReporters=json-summary --coverageReporters=lcov

      - name: Add coverage summary to GitHub UI
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const summaryPath = 'coverage/coverage-summary.json';
          const commentPath = '.coverage-comment.md';
          const marker = '<!-- jest-coverage-comment -->';

          if (!fs.existsSync(summaryPath)) {
            fs.writeFileSync(
              commentPath,
              `${marker}\n## Jest Coverage\n\nCoverage summary was not generated.\n`
            );
            fs.appendFileSync(
              process.env.GITHUB_STEP_SUMMARY,
              '## Jest Coverage\n\nCoverage summary was not generated.\n'
            );
            process.exit(0);
          }

          const total = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
          const rows = [
            ['Lines', total.lines],
            ['Statements', total.statements],
            ['Functions', total.functions],
            ['Branches', total.branches],
          ];

          const format = (metric) => `${metric.pct.toFixed(2)}% (${metric.covered}/${metric.total})`;

          let markdown = '## Jest Coverage\n\n| Metric | Coverage |\n| --- | --- |\n';
          for (const [name, metric] of rows) {
            markdown += `| ${name} | ${format(metric)} |\n`;
          }

          fs.writeFileSync(
            commentPath,
            `${marker}\n${markdown}\n`
          );
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown);
          EOF

      - name: Update sticky PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.coverage-comment.md', 'utf8');
            const marker = '<!-- jest-coverage-comment -->';
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Upload coverage artifact
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: jest
          name: jest-coverage
          fail_ci_if_error: true
