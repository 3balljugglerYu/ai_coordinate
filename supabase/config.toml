# image-gen-worker は pg_cron と generate-async API から呼び出されるため、
# Authorization ヘッダーなしでアクセス可能にする必要がある
[functions.image-gen-worker]
verify_jwt = false

# style-template-cleanup は pg_cron から呼び出されるため verify_jwt は無効。
# 関数内で CRON_SECRET を Authorization ヘッダ照合する 2 層防御（ADR-011）。
[functions.style-template-cleanup]
verify_jwt = false

# cleanup-temp-images は pg_cron から呼び出されるため verify_jwt は無効。
# 関数内で TEMP_IMAGE_CLEANUP_CRON_SECRET を Authorization ヘッダ照合（最小権限原則）。
[functions.cleanup-temp-images]
verify_jwt = false
